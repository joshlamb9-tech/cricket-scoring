<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cricket">
<meta name="theme-color" content="#1e3a5f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="fonts.css">
<script src="jspdf.umd.min.js"></script>
<script src="jspdf.plugin.autotable.min.js"></script>
<title>Cricket Scorer</title>
<style>
:root {
  /* Brand */
  --navy: #1e3a5f;
  --navy-deep: #0f2340;
  --navy-mid: #2a4d7a;
  --gold: #c9a961;
  --gold-bright: #e0bb6e;
  --gold-deep: #a88848;

  /* Surfaces */
  --bg: #faf7ef;
  --bg-warm: #f3eddc;
  --card: #ffffff;

  /* Text */
  --ink: #16202c;
  --ink-soft: #3a4452;
  --muted: #7a7570;

  /* Lines */
  --line: #ebe4d2;
  --line-strong: #d8d0b8;

  /* Semantic */
  --red: #c62828;
  --red-deep: #8e1a1a;
  --green: #2e7d32;
  --live: #16c46c;
  --amber: #f9a825;

  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(15, 35, 64, 0.05), 0 1px 1px rgba(15, 35, 64, 0.03);
  --shadow-md: 0 2px 6px rgba(15, 35, 64, 0.07), 0 1px 3px rgba(15, 35, 64, 0.04);
  --shadow-lg: 0 8px 24px rgba(15, 35, 64, 0.10), 0 2px 6px rgba(15, 35, 64, 0.06);
  --shadow-navy: 0 6px 20px rgba(15, 35, 64, 0.28), 0 1px 3px rgba(15, 35, 64, 0.12);
  --shadow-gold: 0 4px 14px rgba(201, 169, 97, 0.32);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0; height: 100%; overflow-x: hidden;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(circle at 0% 0%, rgba(201, 169, 97, 0.06) 0%, transparent 40%),
    radial-gradient(circle at 100% 100%, rgba(30, 58, 95, 0.04) 0%, transparent 40%);
  color: var(--ink);
  -webkit-user-select: none; user-select: none;
  font-size: 16px;
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum' 1, 'cv11' 1;
  position: relative;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
.display-font {
  font-family: 'Bebas Neue', 'Inter', sans-serif;
  letter-spacing: 0;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url('logo-watermark.svg');
  background-position: center center;
  background-repeat: no-repeat;
  background-size: min(70%, 420px) auto;
  opacity: 0.045;
  pointer-events: none;
  z-index: 0;
}
.app { position: relative; z-index: 1; }
input, textarea, select { -webkit-user-select: text; user-select: text; font-family: inherit; }
.app { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }

/* ========== HEADER ========== */
header {
  background: linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 100%);
  color: white;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 2px 8px rgba(15, 35, 64, 0.2);
  flex-shrink: 0;
  position: relative;
  border-bottom: 1px solid var(--gold-deep);
}
header::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--gold) 50%, transparent 100%);
  opacity: 0.6;
}
header h1 {
  margin: 0; font-size: 1.05rem; font-weight: 700; flex: 1;
  letter-spacing: 0.4px;
}
.icon-btn {
  background: transparent; border: none; color: white; font-size: 1.3rem;
  width: 38px; height: 38px; border-radius: 10px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; padding: 0;
  transition: background 0.15s;
}
.icon-btn:active { background: rgba(255,255,255,0.15); transform: scale(0.95); }

/* ========== MAIN ========== */
main { flex: 1; overflow-y: auto; padding: 14px; min-height: 0; }
main.scoring-view {
  overflow: hidden;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
main.scoring-view .card { margin-bottom: 0; padding: 10px 12px; }
main.scoring-view .scoreboard { margin-bottom: 0; padding: 12px 14px; }

/* ========== CARDS ========== */
.card {
  background: var(--card);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-md);
  border: 1px solid var(--line);
}
.card h2 { margin: 0 0 8px 0; font-size: 1.1rem; color: var(--navy); font-weight: 700; letter-spacing: 0.2px; }
.card h3 { margin: 0 0 8px 0; font-size: 0.72rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

/* ========== BUTTONS ========== */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 12px 16px; border-radius: 12px; border: none;
  font-family: inherit; font-size: 1rem; font-weight: 600;
  cursor: pointer;
  transition: transform 0.08s ease, box-shadow 0.15s, background 0.15s;
  min-height: 44px;
  letter-spacing: 0.2px;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 100%);
  color: white;
  box-shadow: 0 2px 6px rgba(15, 35, 64, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.12);
}
.btn-primary:active { background: var(--navy-deep); box-shadow: var(--shadow-sm); }
.btn-secondary {
  background: white; color: var(--navy);
  border: 1.5px solid var(--navy);
  box-shadow: var(--shadow-sm);
}
.btn-secondary:active { background: var(--navy); color: white; }
.btn-danger { background: var(--red); color: white; }
.btn-ghost { background: transparent; color: var(--navy); }
.btn-full { width: 100%; }
.btn-gold {
  background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold-deep) 100%);
  color: var(--navy-deep);
  box-shadow: var(--shadow-gold), inset 0 1px 0 rgba(255, 255, 255, 0.3);
}

/* ========== FORMS ========== */
input[type="text"], input[type="number"], select, textarea {
  width: 100%; padding: 11px 12px; border: 1.5px solid var(--line);
  border-radius: 10px; font-size: 1rem; background: white;
  font-family: inherit; color: var(--ink);
  transition: border-color 0.15s, box-shadow 0.15s;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--navy);
  box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.1);
}
label { display: block; margin-bottom: 12px; font-weight: 600; color: var(--ink-soft); }
label > span { display: block; margin-bottom: 5px; font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; }

.row { display: flex; gap: 8px; }
.row > * { flex: 1; }

/* ========== HOME ========== */
.home-hero {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
  color: white;
  border-radius: 16px;
  padding: 20px 18px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-navy);
  position: relative;
  overflow: hidden;
}
.home-hero::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201, 169, 97, 0.12) 0%, transparent 70%);
  pointer-events: none;
}
.home-hero h1 {
  margin: 0;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.4rem; font-weight: 400; letter-spacing: 2px;
  line-height: 1;
  display: flex; align-items: center; gap: 12px;
  text-transform: uppercase;
}
.home-hero h1::before {
  content: ''; width: 24px; height: 24px; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, var(--red) 30%, var(--red-deep) 100%);
  box-shadow: inset -2px -3px 6px rgba(0,0,0,0.3), 0 1px 4px rgba(0,0,0,0.3);
  flex-shrink: 0;
}
.home-hero p { margin: 4px 0 0 34px; opacity: 0.85; font-size: 0.92rem; font-weight: 500; }

.section-label {
  font-size: 0.72rem; color: var(--muted); text-transform: uppercase;
  letter-spacing: 1.2px; font-weight: 700;
  margin: 0 0 10px 4px;
}

.match-list { display: flex; flex-direction: column; gap: 12px; }
.match-item {
  background: white;
  border-radius: 14px;
  padding: 14px;
  box-shadow: var(--shadow-md);
  cursor: pointer;
  border: 1px solid var(--line);
  border-left: 4px solid var(--gold);
  transition: transform 0.1s, box-shadow 0.15s;
  position: relative;
  overflow: hidden;
}
.match-item:active { transform: scale(0.99); box-shadow: var(--shadow-sm); }
.match-item.in-progress { border-left-color: var(--live); }
.match-item.complete { border-left-color: var(--green); }
.match-item .teams {
  font-weight: 700; font-size: 1.15rem; color: var(--navy);
  letter-spacing: 0.2px;
}
.match-item .versus {
  color: var(--gold-deep); font-weight: 600; margin: 0 6px;
  font-size: 0.9rem;
}
.match-item .meta { font-size: 0.8rem; color: var(--muted); margin-top: 3px; letter-spacing: 0.3px; }
.match-item .scores { font-size: 0.95rem; margin-top: 8px; color: var(--ink-soft); font-weight: 500; }
.match-item .scores strong { color: var(--ink); font-weight: 700; }
.match-item .result-line {
  font-weight: 700; color: var(--green); margin-top: 6px;
  font-size: 0.92rem;
}
.match-item-actions { display: flex; gap: 4px; margin-top: 10px; }

.empty-state { text-align: center; padding: 48px 16px; color: var(--muted); }
.empty-state .icon {
  font-size: 3rem; margin-bottom: 10px;
  display: inline-block;
}

/* ========== SCOREBOARD ========== */
.scoreboard {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
  color: white;
  border-radius: 16px;
  padding: 14px 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-navy);
  position: relative;
  overflow: hidden;
  border: 1px solid var(--navy-deep);
}
.scoreboard::before {
  content: '';
  position: absolute; top: -40%; right: -15%;
  width: 240px; height: 240px;
  background: radial-gradient(circle, rgba(201, 169, 97, 0.10) 0%, transparent 65%);
  pointer-events: none;
}
.scoreboard::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--gold) 50%, transparent 100%);
  opacity: 0.5;
}
.scoreboard .innings-label {
  font-size: 0.7rem; opacity: 0.92;
  letter-spacing: 1.4px; text-transform: uppercase;
  font-weight: 700;
  display: flex; align-items: center; gap: 8px;
}
.scoreboard .live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--live);
  box-shadow: 0 0 8px rgba(22, 196, 108, 0.7), 0 0 14px rgba(22, 196, 108, 0.4);
  animation: livepulse 1.6s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes livepulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.7); }
}
.scoreboard .main-score {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3.2rem; font-weight: 400;
  letter-spacing: 1px; line-height: 0.95;
  margin: 6px 0 2px 0;
  display: flex; align-items: baseline; flex-wrap: wrap; gap: 0;
}
.scoreboard .main-score .runs { color: white; }
.scoreboard .main-score .slash {
  color: var(--gold-bright); font-weight: 400;
  margin: 0 6px; opacity: 0.9;
}
.scoreboard .main-score .wkts { color: white; }
.scoreboard .main-score .ov {
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem; opacity: 0.78; font-weight: 500;
  margin-left: 12px; letter-spacing: 0.3px;
  align-self: center;
}
.scoreboard .target {
  font-size: 0.85rem; color: var(--gold-bright); margin-top: 3px;
  font-weight: 600; letter-spacing: 0.3px;
}
.scoreboard .pair-info {
  font-size: 0.78rem; color: var(--gold-bright); margin-top: 3px;
  font-weight: 600; letter-spacing: 0.3px; opacity: 0.95;
}

/* ========== BATTERS / BOWLER ========== */
.batters-row, .bowler-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 5px 0;
  border-bottom: 1px solid var(--line);
  font-size: 0.95rem;
}
.batters-row:last-child, .bowler-row:last-child { border-bottom: none; }
.batters-row .name, .bowler-row .name {
  font-weight: 600; color: var(--ink);
  display: flex; align-items: center; gap: 4px;
}
.bowler-row .name::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--red); flex-shrink: 0; margin-right: 2px;
}
.batters-row .stats, .bowler-row .stats {
  color: var(--ink-soft); font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.batters-row.striker .name::after {
  content: '•'; color: var(--gold); margin-left: 2px; font-size: 1.1rem;
}
.batters-row.striker { background: linear-gradient(90deg, rgba(201, 169, 97, 0.08) 0%, transparent 100%); margin: 0 -12px; padding: 5px 12px; }
.batters-row.striker .stats { color: var(--navy); font-weight: 700; }

/* ========== THIS OVER ========== */
.this-over-inline {
  display: flex; align-items: center; gap: 10px;
  padding-top: 8px; margin-top: 4px;
  border-top: 1px solid var(--line);
}
.this-over-inline .ov-label {
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--muted); font-weight: 700; flex-shrink: 0;
}
.this-over { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
.ball-pip {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 26px; height: 26px; padding: 0 6px;
  border-radius: 50%; background: var(--bg-warm);
  font-weight: 700; font-size: 0.82rem;
  border: 1px solid var(--line-strong);
  color: var(--ink-soft);
  box-shadow: var(--shadow-sm);
  animation: pipIn 0.18s ease-out;
}
@keyframes pipIn {
  from { transform: scale(0.6); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.ball-pip.boundary {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
  color: var(--gold-bright);
  border-color: var(--navy-deep);
  box-shadow: 0 1px 4px rgba(15, 35, 64, 0.3);
}
.ball-pip.wicket {
  background: linear-gradient(135deg, var(--red) 0%, var(--red-deep) 100%);
  color: white; border-color: var(--red-deep);
  box-shadow: 0 1px 4px rgba(198, 40, 40, 0.4);
}
.ball-pip.extra {
  background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold-deep) 100%);
  color: var(--navy-deep); border-color: var(--gold-deep);
  font-size: 0.72rem;
}

/* ========== RUN BUTTONS ========== */
.run-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 7px; }
.run-btn {
  height: 50px; font-size: 1.3rem; font-weight: 700;
  background: linear-gradient(180deg, #ffffff 0%, #f5efde 100%);
  color: var(--navy); border: 1.5px solid var(--line-strong);
  border-radius: 12px; cursor: pointer; font-family: inherit;
  box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,0.5);
  transition: transform 0.08s, box-shadow 0.1s;
  font-variant-numeric: tabular-nums;
}
.run-btn:active {
  transform: scale(0.96);
  background: linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 100%);
  color: white;
}
.run-btn.boundary {
  background: linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 100%);
  color: white;
  border-color: var(--navy-deep);
  box-shadow: 0 2px 6px rgba(15, 35, 64, 0.25), inset 0 1px 0 rgba(255,255,255,0.12);
}
.run-btn.boundary:active { background: var(--navy-deep); transform: scale(0.96); }
.run-btn.six {
  background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold-deep) 100%);
  color: var(--navy-deep);
  border-color: var(--gold-deep);
  box-shadow: var(--shadow-gold), inset 0 1px 0 rgba(255,255,255,0.3);
}
.run-btn.six:active { background: var(--gold-deep); transform: scale(0.96); }

/* ========== EXTRA / WICKET BUTTONS ========== */
.extra-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
.extra-btn {
  height: 42px; font-size: 0.9rem; font-weight: 700;
  background: linear-gradient(180deg, #ffffff 0%, #fdf9ed 100%);
  color: var(--navy-deep);
  border: 1.5px solid var(--gold);
  border-radius: 10px; cursor: pointer; font-family: inherit;
  box-shadow: var(--shadow-sm);
  letter-spacing: 0.3px;
  transition: transform 0.08s, background 0.1s;
}
.extra-btn:active {
  background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold-deep) 100%);
  transform: scale(0.95);
}
.extra-btn.wicket {
  border-color: var(--red); color: var(--red);
  background: linear-gradient(180deg, #ffffff 0%, #fdebeb 100%);
}
.extra-btn.wicket:active {
  background: linear-gradient(180deg, var(--red) 0%, var(--red-deep) 100%);
  color: white;
}

/* ========== ACTION BAR ========== */
.action-bar {
  background: transparent;
  padding: 0;
  display: flex; gap: 6px;
  flex-shrink: 0;
}
.action-bar .btn { flex: 1; padding: 9px; font-size: 0.88rem; min-height: 38px; letter-spacing: 0.3px; }

/* ========== MODAL ========== */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(15, 35, 64, 0.55);
  z-index: 100; display: flex; align-items: flex-end; justify-content: center;
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  animation: fadeIn 0.18s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--bg); border-radius: 20px 20px 0 0;
  width: 100%; max-width: 500px;
  padding: 18px;
  padding-bottom: calc(18px + env(safe-area-inset-bottom));
  max-height: 88vh; overflow-y: auto;
  box-shadow: 0 -8px 30px rgba(15, 35, 64, 0.2);
  animation: slideUp 0.22s cubic-bezier(0.16, 1, 0.3, 1);
  border-top: 3px solid var(--gold);
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0.5; } to { transform: translateY(0); opacity: 1; } }
.modal h2 { margin: 0 0 12px 0; color: var(--navy); font-weight: 700; letter-spacing: 0.2px; font-size: 1.2rem; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.modal-grid .btn { width: 100%; }
.modal-list { display: flex; flex-direction: column; gap: 6px; }
.modal-list .btn { justify-content: flex-start; }

/* ========== TOAST ========== */
.toast {
  position: fixed; bottom: calc(80px + env(safe-area-inset-bottom));
  left: 50%; transform: translateX(-50%);
  background: linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 100%);
  color: white; padding: 11px 18px; border-radius: 100px;
  z-index: 200; font-size: 0.9rem; font-weight: 600;
  box-shadow: var(--shadow-navy);
  border: 1px solid var(--navy-deep);
  animation: toast-in 0.2s ease;
}
@keyframes toast-in { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }

/* ========== FREE HIT ========== */
.free-hit-banner {
  background: linear-gradient(90deg, var(--gold) 0%, var(--gold-bright) 50%, var(--gold) 100%);
  color: var(--navy-deep);
  padding: 8px 14px; border-radius: 10px; margin-bottom: 0;
  font-weight: 800; font-size: 0.85rem; text-align: center;
  letter-spacing: 1.5px; text-transform: uppercase;
  box-shadow: var(--shadow-gold);
  animation: freeHitPulse 1.8s ease-in-out infinite;
}
@keyframes freeHitPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(201, 169, 97, 0.5), var(--shadow-md); }
  50% { box-shadow: 0 0 0 6px rgba(201, 169, 97, 0), var(--shadow-md); }
}

/* ========== SCORECARD ========== */
.result-banner {
  background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold) 50%, var(--gold-deep) 100%);
  color: var(--navy-deep);
  border-radius: 16px;
  padding: 18px 16px;
  margin-bottom: 14px;
  text-align: center;
  box-shadow: var(--shadow-gold);
  position: relative; overflow: hidden;
  border: 1px solid var(--gold-deep);
}
.result-banner::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at top, rgba(255,255,255,0.25) 0%, transparent 50%);
  pointer-events: none;
}
.result-banner h2 {
  margin: 0; color: var(--navy-deep);
  font-family: 'Bebas Neue', sans-serif;
  font-weight: 400; font-size: 1.6rem; letter-spacing: 1.5px;
  text-shadow: 0 1px 0 rgba(255,255,255,0.3);
  text-transform: uppercase;
}
.result-banner .label {
  font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px;
  margin-bottom: 4px; opacity: 0.65; font-weight: 700;
}

.innings-header {
  background: linear-gradient(90deg, var(--navy) 0%, var(--navy-mid) 100%);
  color: white;
  padding: 10px 14px;
  border-radius: 10px 10px 0 0;
  margin: 0 -14px 12px -14px;
  font-weight: 700;
  letter-spacing: 0.3px;
  display: flex; justify-content: space-between; align-items: baseline;
  border-bottom: 2px solid var(--gold);
}
.innings-header .team { font-size: 1rem; }
.innings-header .innings-score {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.35rem; font-weight: 400; letter-spacing: 0.5px;
}

.scorecard-table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
.scorecard-table th, .scorecard-table td { padding: 7px 4px; text-align: left; border-bottom: 1px solid var(--line); }
.scorecard-table th { color: var(--muted); font-weight: 700; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1px; }
.scorecard-table td { color: var(--ink); }
.scorecard-table tbody tr:hover { background: var(--bg-warm); }
.scorecard-table td.num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
.scorecard-table th.num { text-align: right; }
.scorecard-table td.name { font-weight: 600; color: var(--navy); }
.scorecard-table td.how-out { color: var(--muted); font-size: 0.85rem; font-style: italic; }

/* ========== MISC ========== */
.muted { color: var(--muted); font-size: 0.9rem; }
.center { text-align: center; }
hr { border: none; border-top: 1px solid var(--line); margin: 14px 0; }
.divider { height: 1px; background: var(--line); margin: 10px 0; }

/* ========== PILLS ========== */
.pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 100px; font-size: 0.7rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
}
.pill-live {
  background: linear-gradient(135deg, var(--live) 0%, #0ea65a 100%);
  color: white;
  box-shadow: 0 1px 4px rgba(22, 196, 108, 0.3);
}
.pill-live::before {
  content: ''; width: 5px; height: 5px; background: white; border-radius: 50%;
  animation: livepulse 1.6s ease-in-out infinite;
}
.pill-done { background: var(--ink-soft); color: white; }
.pill-paused { background: linear-gradient(135deg, var(--gold-bright), var(--gold-deep)); color: var(--navy-deep); }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// =========================================================================
// STATE
// =========================================================================
let matches = [];      // all saved matches
let match = null;      // currently loaded match
let view = 'home';     // 'home' | 'setup' | 'scoring' | 'scorecard'
let modal = null;      // null or { type, data }
let toast = null;      // null or string
let stateHistory = []; // for undo — snapshots of match state

// =========================================================================
// STORAGE
// =========================================================================
const STORAGE_KEY = 'cricket-scoring-v1';
function saveAll() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ matches }));
  } catch (e) { console.error('Save failed', e); }
}
function loadAll() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      matches = data.matches || [];
      // Backward-compat: default to 2 innings for matches saved before this option existed
      matches.forEach(m => {
        if (m.totalInnings == null) m.totalInnings = 2;
        if (m.widePenalty == null) m.widePenalty = 1;
        if (m.noBallPenalty == null) m.noBallPenalty = 1;
        if (m.wideRebowled == null) m.wideRebowled = true;
        if (m.noBallRebowled == null) m.noBallRebowled = true;
      });
    }
  } catch (e) { console.error('Load failed', e); matches = []; }
}
function upsertMatch() {
  if (!match) return;
  match.updatedAt = new Date().toISOString();
  const idx = matches.findIndex(m => m.id === match.id);
  if (idx >= 0) matches[idx] = match;
  else matches.unshift(match);
  saveAll();
}

// =========================================================================
// MATCH CREATION
// =========================================================================
function createMatch(opts) {
  const now = new Date();
  const m = {
    id: 'match-' + now.getTime(),
    format: opts.format,                    // 'standard' | 'pairs'
    teamA: opts.teamA || 'Home',
    teamB: opts.teamB || 'Away',
    oversTotal: opts.oversTotal || 20,
    wicketsToOut: opts.wicketsToOut || 10,
    totalInnings: opts.totalInnings || 2,   // 1 or 2
    playersA: opts.playersA || [],
    playersB: opts.playersB || [],
    pairsConfig: opts.format === 'pairs' ? {
      pairCount: opts.pairCount || 5,
      oversPerPair: opts.oversPerPair || 4,
      runsPerWicket: -5,
      startScore: opts.startScore || 0,
    } : null,
    widePenalty: opts.widePenalty != null ? opts.widePenalty : 1,
    noBallPenalty: opts.noBallPenalty != null ? opts.noBallPenalty : 1,
    wideRebowled: opts.wideRebowled != null ? opts.wideRebowled : true,
    noBallRebowled: opts.noBallRebowled != null ? opts.noBallRebowled : true,
    tossWonBy: opts.tossWonBy,              // 'a' | 'b'
    battingFirst: opts.battingFirst,        // 'a' | 'b'
    innings: [],
    currentInnings: 0,
    result: null,
    createdAt: now.toISOString(),
    updatedAt: now.toISOString(),
  };
  m.innings.push(createInnings(m, m.battingFirst));
  return m;
}

function createInnings(m, battingTeam) {
  const players = battingTeam === 'a' ? m.playersA : m.playersB;
  const fielders = battingTeam === 'a' ? m.playersB : m.playersA;
  const ing = {
    battingTeam,
    score: m.format === 'pairs' ? m.pairsConfig.startScore : 0,
    runs: 0,                  // actual runs scored (separate from score for pairs)
    wickets: 0,
    ballsBowled: 0,           // legal balls
    extras: { wides: 0, noBalls: 0, byes: 0, legByes: 0, penalty: 0 },
    striker: 0,
    nonStriker: 1,
    batters: players.map((name, idx) => ({
      idx, name: name || `Batter ${idx+1}`,
      runs: 0, balls: 0, fours: 0, sixes: 0,
      out: false, howOut: null, in: idx < 2,
    })),
    currentBowler: null,
    previousBowler: null,
    bowlers: fielders.map((name, idx) => ({
      idx, name: name || `Bowler ${idx+1}`,
      balls: 0, runs: 0, wickets: 0, maidens: 0,
      runsThisOver: 0, ballsThisOver: 0,
    })),
    balls: [],               // log of every delivery
    thisOver: [],            // current over pips for display
    freeHit: false,
    complete: false,
  };
  if (m.format === 'pairs') {
    ing.currentPair = 0;
    ing.pairs = [];
    for (let i = 0; i < m.pairsConfig.pairCount; i++) {
      ing.pairs.push({
        idx: i,
        batters: [i*2, i*2+1],
        runs: 0, wickets: 0,
        ballsBowled: 0, complete: false,
      });
    }
  }
  return ing;
}

// =========================================================================
// SCORING LOGIC
// =========================================================================
function snapshot() {
  stateHistory.push(JSON.stringify(match));
  if (stateHistory.length > 30) stateHistory.shift();
}
function undo() {
  if (stateHistory.length === 0) { showToast('Nothing to undo'); return; }
  const prev = stateHistory.pop();
  match = JSON.parse(prev);
  upsertMatch();
  render();
}

function currentInnings() { return match.innings[match.currentInnings]; }
function currentPair() {
  const ing = currentInnings();
  if (match.format !== 'pairs') return null;
  return ing.pairs[ing.currentPair];
}
function striker() { const ing = currentInnings(); return ing.batters[ing.striker]; }
function nonStriker() { const ing = currentInnings(); return ing.batters[ing.nonStriker]; }
function bowler() {
  const ing = currentInnings();
  if (ing.currentBowler == null) return null;
  return ing.bowlers[ing.currentBowler];
}

function needBowler() { return currentInnings().currentBowler == null; }

function addRuns(runs, isExtra) {
  if (needBowler()) { promptBowler(); return; }
  snapshot();
  const ing = currentInnings();
  const b = bowler();
  const s = striker();
  ing.thisOver.push({ runs, type: 'runs' });
  ing.balls.push({ over: oversCompletedDisplay(b.balls).whole, ballInOver: oversCompletedDisplay(b.balls).part + 1, batter: s.idx, bowler: b.idx, runs, type: 'runs' });
  s.runs += runs;
  s.balls += 1;
  if (runs === 4) s.fours += 1;
  if (runs === 6) s.sixes += 1;
  b.runs += runs;
  b.balls += 1;
  b.runsThisOver += runs;
  b.ballsThisOver += 1;
  ing.runs += runs;
  ing.score += runs;
  ing.ballsBowled += 1;
  if (match.format === 'pairs') {
    const p = currentPair();
    p.runs += runs;
    p.ballsBowled += 1;
  }
  if (runs % 2 === 1) swapStrike();
  ing.freeHit = false;
  postBall();
}

function addExtra(type, runs) {
  if (needBowler()) { promptBowler(); return; }
  snapshot();
  const ing = currentInnings();
  const b = bowler();
  const s = striker();
  // type: 'wd' | 'nb' | 'b' | 'lb'
  // runs: total runs on the delivery (for wd/nb, the +runs ON TOP of the 1-run penalty; for b/lb, just the byes)
  let label = '';
  if (type === 'wd') {
    const widePenalty = match.widePenalty != null ? match.widePenalty : 1;
    const wideRuns = widePenalty + runs;
    ing.extras.wides += wideRuns;
    ing.runs += wideRuns;
    ing.score += wideRuns;
    b.runs += wideRuns;
    b.runsThisOver += wideRuns;
    if (match.format === 'pairs') {
      const p = currentPair();
      p.runs += wideRuns;
    }
    label = runs > 0 ? `${wideRuns}wd` : (widePenalty > 1 ? `${widePenalty}wd` : 'wd');
    if (runs % 2 === 1) swapStrike();
    ing.thisOver.push({ runs: wideRuns, type: 'extra', label });
    ing.balls.push({ batter: s.idx, bowler: b.idx, runs: wideRuns, type: 'wide', label });
    // If not re-bowled, count as a ball
    if (match.wideRebowled === false) {
      b.balls += 1;
      b.ballsThisOver += 1;
      ing.ballsBowled += 1;
      if (match.format === 'pairs') currentPair().ballsBowled += 1;
    }
  } else if (type === 'nb') {
    const nbPenalty = match.noBallPenalty != null ? match.noBallPenalty : 1;
    const nbRuns = nbPenalty + runs;
    ing.extras.noBalls += nbPenalty;
    ing.runs += nbRuns;
    ing.score += nbRuns;
    b.runs += nbRuns;
    b.runsThisOver += nbRuns;
    s.balls += 1;     // striker faces a no-ball
    s.runs += runs;   // runs off the bat
    if (match.format === 'pairs') {
      const p = currentPair();
      p.runs += nbRuns;
    }
    label = runs > 0 ? `${nbRuns}nb` : (nbPenalty > 1 ? `${nbPenalty}nb` : 'nb');
    if (runs % 2 === 1) swapStrike();
    ing.thisOver.push({ runs: nbRuns, type: 'extra', label });
    ing.balls.push({ batter: s.idx, bowler: b.idx, runs: nbRuns, type: 'noball', label });
    ing.freeHit = true;
    // If not re-bowled, count as a ball
    if (match.noBallRebowled === false) {
      b.balls += 1;
      b.ballsThisOver += 1;
      ing.ballsBowled += 1;
      if (match.format === 'pairs') currentPair().ballsBowled += 1;
    }
  } else if (type === 'b') {
    ing.extras.byes += runs;
    ing.runs += runs;
    ing.score += runs;
    b.balls += 1;
    b.ballsThisOver += 1;
    s.balls += 1;
    ing.ballsBowled += 1;
    if (match.format === 'pairs') {
      const p = currentPair();
      p.runs += runs;
      p.ballsBowled += 1;
    }
    label = `${runs}b`;
    if (runs % 2 === 1) swapStrike();
    ing.thisOver.push({ runs, type: 'extra', label });
    ing.balls.push({ batter: s.idx, bowler: b.idx, runs, type: 'bye', label });
    ing.freeHit = false;
  } else if (type === 'lb') {
    ing.extras.legByes += runs;
    ing.runs += runs;
    ing.score += runs;
    b.balls += 1;
    b.ballsThisOver += 1;
    s.balls += 1;
    ing.ballsBowled += 1;
    if (match.format === 'pairs') {
      const p = currentPair();
      p.runs += runs;
      p.ballsBowled += 1;
    }
    label = `${runs}lb`;
    if (runs % 2 === 1) swapStrike();
    ing.thisOver.push({ runs, type: 'extra', label });
    ing.balls.push({ batter: s.idx, bowler: b.idx, runs, type: 'legbye', label });
    ing.freeHit = false;
  }
  postBall();
}

function addWicket(howOut, batterOutPos, runsCompleted, crossed, fielderName) {
  // batterOutPos: 'striker' | 'non-striker' (mostly striker; non-striker only for run out)
  // runsCompleted: runs taken before wicket (run-outs etc.)
  // crossed: true if batters crossed before catch/run-out (affects who is on strike next)
  // fielderName: catcher's name for Caught dismissals (or null)
  if (needBowler()) { promptBowler(); return; }
  snapshot();
  const ing = currentInnings();
  const b = bowler();
  const s = striker();
  const ns = nonStriker();
  const runs = runsCompleted || 0;

  // Add the completed runs first (to striker, since they hit the ball)
  s.runs += runs;
  b.runs += runs;
  b.runsThisOver += runs;
  ing.runs += runs;
  ing.score += runs;
  if (match.format === 'pairs') {
    const p = currentPair();
    p.runs += runs;
  }

  // Mark batter out
  const outBatter = batterOutPos === 'striker' ? s : ns;
  outBatter.out = true;
  outBatter.howOut = formatHowOut(howOut, b.name, fielderName);

  // Ball counts as bowled (unless wicket on a wide/NB — handled separately)
  s.balls += 1;
  b.balls += 1;
  b.ballsThisOver += 1;
  ing.ballsBowled += 1;
  ing.wickets += 1;
  if (match.format === 'pairs') {
    const p = currentPair();
    p.ballsBowled += 1;
    p.wickets += 1;
    p.runs += match.pairsConfig.runsPerWicket;  // -5
    ing.score += match.pairsConfig.runsPerWicket;
  }

  // Bowler gets credit unless run-out / obstructing / retired-out etc.
  const bowlerCredit = !['Run out', 'Retired', 'Obstructing'].includes(howOut);
  if (bowlerCredit) b.wickets += 1;

  ing.thisOver.push({ runs, type: 'wicket', label: 'W' });
  ing.balls.push({ batter: outBatter.idx, bowler: b.idx, runs, type: 'wicket', howOut: outBatter.howOut, label: 'W' });

  ing.freeHit = false;

  // Check if all out / end of innings (standard format)
  if (match.format === 'standard' && ing.wickets >= match.wicketsToOut) {
    endInnings();
    upsertMatch();
    render();
    return;
  }

  // Pairs cricket: batter doesn't leave — they keep batting, just lose 5 runs
  if (match.format === 'pairs') {
    outBatter.out = false;
    outBatter.howOut = null;
    // Handle strike: swap if odd runs, or if batters crossed
    if (runs % 2 === 1) swapStrike();
    if (crossed && runs % 2 === 0) swapStrike();
    postBall();
    return;
  }

  // Standard: prompt for new batter, passing crossed info for strike rotation
  promptNewBatter(batterOutPos, crossed);
}

function swapStrike() {
  const ing = currentInnings();
  [ing.striker, ing.nonStriker] = [ing.nonStriker, ing.striker];
}

function formatHowOut(method, bowlerName, fielderName) {
  if (method === 'Bowled') return `b ${bowlerName}`;
  if (method === 'LBW') return `lbw b ${bowlerName}`;
  if (method === 'Caught') {
    if (!fielderName || fielderName === bowlerName) return `c & b ${bowlerName}`;
    return `c ${fielderName} b ${bowlerName}`;
  }
  if (method === 'Stumped') return `st b ${bowlerName}`;
  if (method === 'Run out') return fielderName ? `run out (${fielderName})` : 'run out';
  if (method === 'Hit wicket') return `hit wicket b ${bowlerName}`;
  if (method === 'Retired') return 'retired';
  return method;
}

function postBall() {
  // Check end of over (6 legal balls)
  const ing = currentInnings();
  const b = bowler();
  if (b && b.ballsThisOver === 6) endOver();
  // Check pairs cricket: end of pair's overs?
  if (match.format === 'pairs') {
    const p = currentPair();
    const oversBowled = Math.floor(p.ballsBowled / 6);
    if (oversBowled >= match.pairsConfig.oversPerPair && p.ballsBowled % 6 === 0) {
      p.complete = true;
      if (ing.currentPair + 1 < match.pairsConfig.pairCount) {
        ing.currentPair += 1;
        const np = currentPair();
        ing.striker = np.batters[0];
        ing.nonStriker = np.batters[1];
        ing.batters[ing.striker].in = true;
        ing.batters[ing.nonStriker].in = true;
        showToast(`Pair ${ing.currentPair + 1} of ${match.pairsConfig.pairCount} at the crease`);
      } else {
        endInnings();
        upsertMatch();
        render();
        return;
      }
    }
  }
  // Check overs completed in standard
  if (match.format === 'standard') {
    if (Math.floor(ing.ballsBowled / 6) >= match.oversTotal && ing.ballsBowled % 6 === 0) {
      endInnings();
      upsertMatch();
      render();
      return;
    }
  }
  // Check 2nd innings target reached
  if (match.currentInnings === 1) {
    const target = matchTarget();
    if (ing.score >= target) {
      endInnings();
      upsertMatch();
      render();
      return;
    }
  }
  upsertMatch();
  render();
}

function endOver() {
  const ing = currentInnings();
  const b = bowler();
  if (b.runsThisOver === 0 && b.ballsThisOver === 6) b.maidens += 1;
  b.runsThisOver = 0;
  b.ballsThisOver = 0;
  ing.thisOver = [];
  swapStrike();
  ing.previousBowler = ing.currentBowler;
  ing.currentBowler = null;
}

function endInnings() {
  const ing = currentInnings();
  ing.complete = true;
  if (match.currentInnings + 1 < match.totalInnings) {
    // Start next innings
    match.currentInnings += 1;
    const next = match.battingFirst === 'a' ? 'b' : 'a';
    match.innings.push(createInnings(match, next));
    showToast('Innings complete — next innings starting');
  } else {
    // Match over
    determineResult();
    showToast('Match over');
  }
}

function matchTarget() {
  if (match.currentInnings === 0) return null;
  return match.innings[0].score + 1;
}

function determineResult() {
  if (match.totalInnings === 1) {
    const ing = match.innings[0];
    const team = ing.battingTeam === 'a' ? match.teamA : match.teamB;
    match.result = `${team} scored ${ing.score}/${ing.wickets} in ${oversString(ing.ballsBowled)} overs`;
    return;
  }
  const a = match.innings[0].score;
  const b = match.innings[1].score;
  const teamA = match.battingFirst === 'a' ? match.teamA : match.teamB;
  const teamB = match.battingFirst === 'a' ? match.teamB : match.teamA;
  if (a > b) match.result = `${teamA} won by ${a - b} runs`;
  else if (b > a) {
    const wktsLeft = match.format === 'standard' ? (match.wicketsToOut - match.innings[1].wickets) : '—';
    match.result = `${teamB} won` + (match.format === 'standard' ? ` by ${wktsLeft} wickets` : '');
  } else match.result = 'Match tied';
}

// =========================================================================
// HELPERS
// =========================================================================
function oversCompletedDisplay(balls) {
  return { whole: Math.floor(balls / 6), part: balls % 6 };
}
function oversString(balls) {
  const d = oversCompletedDisplay(balls);
  return d.part === 0 ? `${d.whole}` : `${d.whole}.${d.part}`;
}
function showToast(msg) {
  toast = msg;
  render();
  setTimeout(() => { toast = null; render(); }, 1800);
}

// =========================================================================
// PROMPTS / MODALS
// =========================================================================
function promptBowler(isReplacement) {
  const ing = currentInnings();
  const available = ing.bowlers.filter(b => b.idx !== ing.previousBowler || isReplacement);
  modal = { type: 'select-bowler', data: { bowlers: available } };
  render();
}
function pickBowler(idx) {
  const ing = currentInnings();
  ing.currentBowler = idx;
  closeModal();
}
function promptNewBatter(position, crossed) {
  const ing = currentInnings();
  const available = ing.batters.filter(b => !b.out && !b.in);
  if (available.length === 0) {
    endInnings();
    upsertMatch();
    closeModal();
    render();
    return;
  }
  modal = { type: 'select-batter', data: { batters: available, position, crossed } };
  render();
}
function pickBatter(idx, position, crossed) {
  const ing = currentInnings();
  ing.batters[idx].in = true;
  // If batters crossed, the not-out batter has moved to the dismissed batter's end,
  // and the new batter takes the vacant end.
  if (position === 'striker') {
    if (crossed) {
      ing.striker = ing.nonStriker;
      ing.nonStriker = idx;
    } else {
      ing.striker = idx;
    }
  } else {  // non-striker out
    if (crossed) {
      ing.nonStriker = ing.striker;
      ing.striker = idx;
    } else {
      ing.nonStriker = idx;
    }
  }
  closeModal();
  postBall();
}
function promptExtraRuns(extraType) {
  modal = { type: 'extra-runs', data: { extraType } };
  render();
}
function promptWicket() {
  modal = { type: 'wicket-method' };
  render();
}
function pickWicketMethod(method) {
  if (method === 'Caught') {
    const ing = currentInnings();
    modal = { type: 'wicket-fielder', data: { method, fielders: ing.bowlers, bowlerIdx: ing.currentBowler } };
  } else if (method === 'Run out') {
    modal = { type: 'wicket-run-out', data: { method, runsCompleted: 0, batterOutPos: null } };
  } else {
    modal = { type: 'wicket-confirm', data: { method } };
  }
  render();
}
function pickFielder(fielderName) {
  // Called after Caught — proceed to crossed question
  modal = { type: 'wicket-crossed', data: { method: 'Caught', batterOutPos: 'striker', runsCompleted: 0, fielderName } };
  render();
}
function promptCrossed(data) {
  modal = { type: 'wicket-crossed', data };
  render();
}
function closeModal() { modal = null; render(); }

// =========================================================================
// RENDER
// =========================================================================
function render() {
  const app = document.getElementById('app');
  let html = '';
  if (view === 'home') html = renderHome();
  else if (view === 'setup') html = renderSetup();
  else if (view === 'scoring') html = renderScoring();
  else if (view === 'scorecard') html = renderScorecard();
  if (modal) html += renderModal();
  if (toast) html += `<div class="toast">${escapeHtml(toast)}</div>`;
  app.innerHTML = html;
  attachEventHandlers();
}

function escapeHtml(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function renderHome() {
  return `
    <header>
      <h1>Cricket Scorer</h1>
    </header>
    <main>
      <div class="home-hero">
        <h1>Cricket Scorer</h1>
        <p>Ball-by-ball scoring for umpires</p>
      </div>
      <button class="btn btn-primary btn-full" data-action="new-match" style="margin-bottom:18px; font-size:1.05rem;">+ New Match</button>
      ${matches.length === 0 ? `
        <div class="empty-state">
          <div class="icon">🏏</div>
          <p style="font-weight:600; color:var(--ink); font-size:1.05rem;">No matches yet</p>
          <p class="muted">Start a new match to begin scoring.</p>
        </div>
      ` : `
        <div class="section-label">Recent matches</div>
        <div class="match-list">
          ${matches.map(renderMatchItem).join('')}
        </div>
      `}
      <div style="height:40px;"></div>
    </main>
  `;
}

function renderMatchItem(m) {
  const date = new Date(m.createdAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  const status = m.result ? 'complete' : 'in-progress';
  const pill = m.result ? `<span class="pill pill-done">Final</span>` : `<span class="pill pill-live">Live</span>`;
  const scoreLines = m.innings.map(ing => {
    const team = ing.battingTeam === 'a' ? m.teamA : m.teamB;
    return `<strong>${escapeHtml(team)}</strong> ${ing.score}/${ing.wickets} (${oversString(ing.ballsBowled)})`;
  }).join(' &nbsp;·&nbsp; ');
  const fmtLabel = m.format === 'pairs'
    ? `Pairs · ${m.pairsConfig.pairCount}×${m.pairsConfig.oversPerPair} ov`
    : `${m.oversTotal} ov`;
  return `
    <div class="match-item ${status}" data-action="open-match" data-id="${m.id}">
      <div style="display:flex; justify-content:space-between; align-items:start; gap:8px;">
        <div style="flex:1; min-width:0;">
          <div class="teams">${escapeHtml(m.teamA)}<span class="versus">vs</span>${escapeHtml(m.teamB)}</div>
          <div class="meta">${date} · ${fmtLabel}${m.totalInnings === 1 ? ' · 1 innings' : ''}</div>
        </div>
        ${pill}
      </div>
      <div class="scores">${scoreLines}</div>
      ${m.result ? `<div class="result-line">${escapeHtml(m.result)}</div>` : ''}
      <div class="match-item-actions">
        <button class="btn btn-ghost" data-action="delete-match" data-id="${m.id}" style="padding:6px 10px; font-size:0.8rem; color:var(--red); min-height:auto;">Delete</button>
      </div>
    </div>
  `;
}

            <label><span>Overs per pair</span><input type="number" id="oversPerPair" value="4" min="1" max="20"></label>
          </div>
          <label>

        </div>
        <label>
          <span>Player names — Team A (one per line, optional)</span>
          <textarea id="playersA" rows="6" placeholder="Leave blank to use Batter 1, Batter 2..." style="width:100%; padding:12px; border:1.5px solid var(--line); border-radius:8px; font-size:1rem; font-family:inherit; resize:vertical;"></textarea>

function renderScoring() {
  const ing = currentInnings();
  const b = bowler();
  const s = striker();
  const ns = nonStriker();
  const teamName = ing.battingTeam === 'a' ? match.teamA : match.teamB;
  const inningsLabel = `${teamName} — ${match.currentInnings === 0 ? '1st' : '2nd'} innings`;
  const targetLine = match.currentInnings === 1 ? renderTarget() : '';
  const pairLine = match.format === 'pairs' ? renderPairInfo() : '';

  return `
    <header>
      <button class="icon-btn" data-action="goto-home">←</button>
      <h1>${escapeHtml(match.teamA)} v ${escapeHtml(match.teamB)}</h1>
      <button class="icon-btn" data-action="show-menu">⋯</button>
    </header>
    <main class="scoring-view">
      <div class="scoreboard">
        <div class="innings-label"><span class="live-dot"></span>${escapeHtml(inningsLabel)}</div>
        <div class="main-score"><span class="runs">${ing.score}</span><span class="slash">/</span><span class="wkts">${ing.wickets}</span><span class="ov">${oversString(ing.ballsBowled)} ov</span></div>
        ${targetLine}
        ${pairLine}
      </div>

      <div class="card">
        <div class="batters-row ${ing.striker === s.idx ? 'striker' : ''}">
          <span class="name">${escapeHtml(s.name)}</span>
          <span class="stats">${s.runs} (${s.balls})</span>
        </div>
        <div class="batters-row">
          <span class="name">${escapeHtml(ns.name)}</span>
          <span class="stats">${ns.runs} (${ns.balls})</span>
        </div>
        <div class="bowler-row" ${!b ? 'data-action="select-bowler" style="cursor:pointer;"' : ''}>
          <span class="name" style="${!b ? 'color:var(--red); font-style:italic;' : ''}">${b ? escapeHtml(b.name) : 'Tap to select bowler →'}</span>
          <span class="stats">${b ? `${b.wickets}-${b.runs} (${oversString(b.balls)})` : ''}</span>
        </div>
        <div class="this-over-inline">
          <span class="ov-label">Over</span>
          <div class="this-over">
            ${ing.thisOver.length === 0 ? '<span class="muted" style="font-size:0.85rem;">—</span>' : ing.thisOver.map(p => {
              if (p.type === 'wicket') return `<span class="ball-pip wicket">W</span>`;
              if (p.type === 'extra') return `<span class="ball-pip extra">${escapeHtml(p.label)}</span>`;
              if (p.runs === 4 || p.runs === 6) return `<span class="ball-pip boundary">${p.runs}</span>`;
              return `<span class="ball-pip">${p.runs}</span>`;
            }).join('')}
          </div>
        </div>
      </div>

      ${ing.freeHit ? '<div class="free-hit-banner">⚠ FREE HIT</div>' : ''}

      <div class="card">
        <div class="run-grid">
          <button class="run-btn" data-action="runs" data-runs="0">0</button>
          <button class="run-btn" data-action="runs" data-runs="1">1</button>
          <button class="run-btn" data-action="runs" data-runs="2">2</button>
          <button class="run-btn" data-action="runs" data-runs="3">3</button>
          <button class="run-btn boundary" data-action="runs" data-runs="4">4</button>
          <button class="run-btn six" data-action="runs" data-runs="6">6</button>
        </div>
        <div class="extra-grid">
          <button class="extra-btn" data-action="extra" data-type="wd">Wd</button>
          <button class="extra-btn" data-action="extra" data-type="nb">NB</button>
          <button class="extra-btn" data-action="extra" data-type="b">B</button>
          <button class="extra-btn" data-action="extra" data-type="lb">LB</button>
          <button class="extra-btn wicket" data-action="wicket">W</button>
        </div>
      </div>

      <div class="action-bar">
        <button class="btn btn-secondary" data-action="undo">↶ Undo</button>
        <button class="btn btn-secondary" data-action="scorecard">Scorecard</button>
      </div>
    </main>
  `;
}

function renderTarget() {
  const target = matchTarget();
  const ing = currentInnings();
  const need = target - ing.score;
  const ballsBowled = ing.ballsBowled;
  const ballsTotal = match.oversTotal * 6;
  const ballsLeft = ballsTotal - ballsBowled;
  const oversLeft = oversString(ballsLeft);
  if (need <= 0) return `<div class="target">Target chased!</div>`;
  return `<div class="target">Need ${need} from ${oversLeft} overs</div>`;
}

function renderPairInfo() {
  const ing = currentInnings();
  const p = currentPair();
  if (!p) return '';
  const oversBowled = p.ballsBowled / 6;
  const oversLeft = match.pairsConfig.oversPerPair - oversBowled;
  return `<div class="pair-info">Pair ${ing.currentPair + 1} of ${match.pairsConfig.pairCount} · ${p.runs} (${oversString(p.ballsBowled)}) · ${oversString(p.ballsBowled % 6 === 0 ? oversLeft * 6 : (match.pairsConfig.oversPerPair * 6 - p.ballsBowled))} ov left</div>`;
}

function renderScorecard() {
  const html = match.innings.map((ing, idx) => {
    const team = ing.battingTeam === 'a' ? match.teamA : match.teamB;
    const extras = ing.extras;
    const totalExtras = extras.wides + extras.noBalls + extras.byes + extras.legByes + (extras.penalty || 0);
    return `
      <div class="card">
        <div class="innings-header">
          <span class="team">${escapeHtml(team)}</span>
          <span class="innings-score">${ing.score}/${ing.wickets} <span style="opacity:0.7; font-weight:500; font-size:0.85rem;">(${oversString(ing.ballsBowled)} ov)</span></span>
        </div>
        <table class="scorecard-table">
          <thead><tr><th>Batter</th><th class="num">R</th><th class="num">B</th><th class="num">4s</th><th class="num">6s</th><th>How out</th></tr></thead>
          <tbody>
          ${ing.batters.filter(b => b.in || b.runs > 0 || b.balls > 0).map(b => `
            <tr>
              <td class="name">${escapeHtml(b.name)}</td>
              <td class="num">${b.runs}</td>
              <td class="num">${b.balls}</td>
              <td class="num">${b.fours}</td>
              <td class="num">${b.sixes}</td>
              <td class="how-out">${b.out ? escapeHtml(b.howOut) : (b.in ? 'not out' : '')}</td>
            </tr>
          `).join('')}
          </tbody>
        </table>
        <div style="display:flex; justify-content:space-between; margin-top:10px; font-size:0.85rem; color:var(--muted);">
          <span><strong style="color:var(--ink);">Extras:</strong> ${totalExtras} (w ${extras.wides}, nb ${extras.noBalls}, b ${extras.byes}, lb ${extras.legByes})</span>
          <span><strong style="color:var(--ink);">Total:</strong> ${ing.score}/${ing.wickets}</span>
        </div>
        <hr>
        <table class="scorecard-table">
          <thead><tr><th>Bowler</th><th class="num">O</th><th class="num">M</th><th class="num">R</th><th class="num">W</th></tr></thead>
          <tbody>
          ${ing.bowlers.filter(b => b.balls > 0).map(b => `
            <tr>
              <td class="name">${escapeHtml(b.name)}</td>
              <td class="num">${oversString(b.balls)}</td>
              <td class="num">${b.maidens}</td>
              <td class="num">${b.runs}</td>
              <td class="num">${b.wickets}</td>
            </tr>
          `).join('')}
          </tbody>
        </table>
      </div>
    `;
  }).join('');
  return `
    <header>
      <button class="icon-btn" data-action="back-to-scoring">←</button>
      <h1>Scorecard</h1>
      <button class="icon-btn" data-action="export-pdf" title="Export PDF">⤓</button>
    </header>
    <main>
      ${match.result ? `<div class="result-banner"><div class="label">Result</div><h2>${escapeHtml(match.result)}</h2></div>` : ''}
      ${html}
      <button class="btn btn-gold btn-full" data-action="export-pdf" style="margin-top:8px;">⤓ Export Scorecard PDF</button>
      <div style="height:40px;"></div>
    </main>
  `;
}

  if (modal.type === 'select-bowler') {
    body = `

      <div class="modal-list">
        ${modal.data.bowlers.map(b => `
          <button class="btn btn-secondary" data-action="pick-bowler" data-idx="${b.idx}">
            ${escapeHtml(b.name)} <span style="margin-left:auto; color:var(--muted); font-size:0.85rem;">${b.wickets}-${b.runs} (${oversString(b.balls)})</span>
          </button>

      <button class="btn btn-ghost btn-full" data-action="close-modal" style="margin-top:10px;">Cancel</button>
    `;
  } else if (modal.type === 'select-batter') {
    body = `

      <div class="modal-list">
        ${modal.data.batters.map(b => `
          <button class="btn btn-secondary" data-action="pick-batter" data-idx="${b.idx}" data-position="${modal.data.position}">

    `;
  } else if (modal.type === 'extra-runs') {
    const t = modal.data.extraType;
    const labels = { wd: 'Wide', nb: 'No Ball', b: 'Bye', lb: 'Leg Bye' };
    const penalty = t === 'wd' ? (match.widePenalty || 1) : (match.noBallPenalty || 1);
    const helpText = (t === 'wd' || t === 'nb')
      ? `Runs run by batters (the ${penalty}-run penalty is added automatically):`
      : 'Number of byes:';
    return `<div class="modal-backdrop" data-action="close-modal-backdrop"><div class="modal">
      <h2>${labels[t]}${(t === 'wd' || t === 'nb') ? ` <span style="color:var(--gold-deep); font-weight:600; font-size:0.85rem;">(+${penalty})</span>` : ''}</h2>
      <div class="muted" style="margin-bottom:10px;">${helpText}</div>
      <div class="modal-grid">
        ${[0, 1, 2, 3, 4].filter(n => !(t === 'b' || t === 'lb') || n > 0).map(n => `
          <button class="btn btn-primary" data-action="confirm-extra" data-type="${t}" data-runs="${n}">+${n} run${n === 1 ? '' : 's'}</button>
        `).join('')}

        `).join('')}
      </div>
      <button class="btn btn-ghost btn-full" data-action="close-modal" style="margin-top:10px;">Cancel</button>

  } else if (modal.type === 'wicket-confirm') {
    const method = modal.data.method;
    body = `
      <h2>${escapeHtml(method)}</h2>
      <button class="btn btn-primary btn-full" data-action="finalise-wicket" data-method="${method}" data-position="striker" data-runs="0">Confirm ${escapeHtml(method)}</button>
      <button class="btn btn-ghost btn-full" data-action="close-modal" style="margin-top:10px;">Cancel</button>
    `;
  } else if (modal.type === 'wicket-fielder') {
    const { fielders, bowlerIdx } = modal.data;
    body = `
      <h2>Caught by…</h2>
      <div class="muted" style="margin-bottom:8px; font-size:0.85rem;">Tap the fielder who took the catch.</div>
      <div class="modal-list">

          <button class="btn btn-secondary" data-action="pick-fielder" data-name="${escapeHtml(f.name)}">
            ${escapeHtml(f.name)}${f.idx === bowlerIdx ? ' <span style="margin-left:auto; color:var(--muted); font-size:0.8rem;">(c &amp; b)</span>' : ''}
          </button>
        `).join('')}
      </div>
      <button class="btn btn-ghost btn-full" data-action="close-modal" style="margin-top:10px;">Cancel</button>
    `;
  } else if (modal.type === 'wicket-run-out') {

      <h2>Run Out</h2>

    const d = modal.data;
    body = `
      <h2>Did batters cross?</h2>
      <div class="muted" style="margin-bottom:10px; font-size:0.9rem;">If they crossed, the not-out batter is now at the other end.</div>

        <button class="btn btn-primary" data-action="finalise-wicket-crossed" data-crossed="true">Crossed</button>
      </div>
      <button class="btn btn-ghost btn-full" data-action="close-modal" style="margin-top:10px;">Cancel</button>
    `;
  } else if (modal.type === 'menu') {
    body = `
      <h2>Menu</h2>
      <div class="modal-list">
        <button class="btn btn-secondary" data-action="scorecard">View Scorecard</button>
        <button class="btn btn-secondary" data-action="edit-names">Edit Player Names</button>
        <button class="btn btn-secondary" data-action="change-bowler">Change Bowler (mid-over)</button>
        <button class="btn btn-secondary" data-action="swap-batters">Swap Striker / Non-Striker</button>
        <button class="btn btn-secondary" data-action="end-innings-confirm">End Innings</button>
        <button class="btn btn-secondary" data-action="goto-home">Save &amp; Exit</button>
      </div>
      <button class="btn btn-ghost btn-full" data-action="close-modal" style="margin-top:10px;">Close</button>
    `;
  } else if (modal.type === 'edit-names') {
    const renderTeamInputs = (team, label, roster) => `

      <div class="row" style="margin-top:14px;">
        <button class="btn btn-ghost" data-action="close-modal">Cancel</button>
        <button class="btn btn-primary" data-action="save-names">Save</button>
      </div>
    `;
  }
  return `<div class="modal-backdrop" data-action="close-modal-backdrop"><div class="modal">${body}</div></div>`;
}

function generatePDF() {
  if (!window.jspdf || !window.jspdf.jsPDF) {
    showToast('PDF library not loaded. Refresh and try again.');
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'a4' });
  const pageWidth = doc.internal.pageSize.getWidth();
  const pageHeight = doc.internal.pageSize.getHeight();
  const margin = 40;
  let y = 0;

  // Header banner
  doc.setFillColor(30, 58, 95);
  doc.rect(0, 0, pageWidth, 72, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(20);
  doc.text(`${match.teamA} v ${match.teamB}`, margin, 34);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  const date = new Date(match.createdAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  const fmt = match.format === 'pairs'
    ? `Pairs cricket · ${match.pairsConfig.pairCount} pairs × ${match.pairsConfig.oversPerPair} overs`
    : `${match.oversTotal} overs per innings`;
  doc.text(`${date}  ·  ${fmt}`, margin, 54);
  y = 92;

  // Result banner
  if (match.result) {
    doc.setFillColor(201, 169, 97);
    doc.rect(margin, y - 4, pageWidth - margin*2, 22, 'F');
    doc.setTextColor(18, 36, 56);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(12);
    doc.text(match.result, margin + 10, y + 11);
    y += 32;
  }

  doc.setTextColor(0, 0, 0);

  // Per innings
  match.innings.forEach((ing) => {
    if (y > pageHeight - 120) { doc.addPage(); y = margin; }

    const team = ing.battingTeam === 'a' ? match.teamA : match.teamB;
    doc.setFillColor(245, 244, 240);
    doc.rect(margin, y - 4, pageWidth - margin*2, 26, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.setTextColor(30, 58, 95);
    doc.text(`${team} — ${ing.score}/${ing.wickets} (${oversString(ing.ballsBowled)} overs)`, margin + 8, y + 14);
    y += 32;

    // Batters
    const battersInPlay = ing.batters.filter(b => b.in || b.runs > 0 || b.balls > 0);
    if (battersInPlay.length > 0) {
      doc.autoTable({
        startY: y,
        head: [['Batter', 'R', 'B', '4s', '6s', 'How out']],
        body: battersInPlay.map(b => [
          b.name,
          String(b.runs),
          String(b.balls),
          String(b.fours),
          String(b.sixes),
          b.out ? b.howOut : (b.in ? 'not out' : '')
        ]),
        theme: 'striped',
        headStyles: { fillColor: [30, 58, 95], textColor: [255, 255, 255], fontSize: 9, fontStyle: 'bold' },
        bodyStyles: { fontSize: 10, cellPadding: 4 },
        columnStyles: { 1: { halign: 'right' }, 2: { halign: 'right' }, 3: { halign: 'right' }, 4: { halign: 'right' } },
        margin: { left: margin, right: margin }
      });
      y = doc.lastAutoTable.finalY + 6;
    }

    // Extras line
    const ex = ing.extras;
    const totalEx = ex.wides + ex.noBalls + ex.byes + ex.legByes + (ex.penalty || 0);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(80, 80, 80);
    doc.text(`Extras: ${totalEx}  (w ${ex.wides}, nb ${ex.noBalls}, b ${ex.byes}, lb ${ex.legByes})`, margin, y + 8);
    doc.setFont('helvetica', 'bold');
    doc.text(`Total: ${ing.score}/${ing.wickets} in ${oversString(ing.ballsBowled)} overs`, pageWidth - margin, y + 8, { align: 'right' });
    y += 22;

    // Bowlers
    const bowlersBowled = ing.bowlers.filter(b => b.balls > 0);
    if (bowlersBowled.length > 0) {
      if (y > pageHeight - 100) { doc.addPage(); y = margin; }
      doc.autoTable({
        startY: y,
        head: [['Bowler', 'O', 'M', 'R', 'W']],
        body: bowlersBowled.map(b => [
          b.name,
          oversString(b.balls),
          String(b.maidens),
          String(b.runs),
          String(b.wickets)
        ]),
        theme: 'striped',
        headStyles: { fillColor: [30, 58, 95], textColor: [255, 255, 255], fontSize: 9, fontStyle: 'bold' },
        bodyStyles: { fontSize: 10, cellPadding: 4 },
        columnStyles: { 1: { halign: 'right' }, 2: { halign: 'right' }, 3: { halign: 'right' }, 4: { halign: 'right' } },
        margin: { left: margin, right: margin }
      });
      y = doc.lastAutoTable.finalY + 16;
    }

    // Pair breakdown
    if (match.format === 'pairs' && ing.pairs) {
      if (y > pageHeight - 100) { doc.addPage(); y = margin; }
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(10);
      doc.setTextColor(30, 58, 95);
      doc.text('Pair breakdown', margin, y);
      y += 4;
      doc.autoTable({
        startY: y,
        head: [['Pair', 'Batters', 'Runs', 'Wkts', 'Overs']],
        body: ing.pairs.map((p, i) => [
          String(i+1),
          `${ing.batters[p.batters[0]] ? ing.batters[p.batters[0]].name : ''} & ${ing.batters[p.batters[1]] ? ing.batters[p.batters[1]].name : ''}`,
          String(p.runs),
          String(p.wickets),
          oversString(p.ballsBowled)
        ]),
        theme: 'striped',
        headStyles: { fillColor: [201, 169, 97], textColor: [18, 36, 56], fontSize: 9, fontStyle: 'bold' },
        bodyStyles: { fontSize: 10, cellPadding: 4 },
        columnStyles: { 0: { halign: 'center' }, 2: { halign: 'right' }, 3: { halign: 'right' }, 4: { halign: 'right' } },
        margin: { left: margin, right: margin }
      });
      y = doc.lastAutoTable.finalY + 20;
    }
  });

  // Footer on each page
  const pageCount = doc.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(150, 150, 150);
    doc.text(`Scored on Cricket Scorer  ·  ${new Date().toLocaleString('en-GB')}  ·  Page ${i} of ${pageCount}`, margin, pageHeight - 20);
  }

  const safe = s => String(s).replace(/[^a-zA-Z0-9]/g, '_');
  const dateStr = new Date(match.createdAt).toISOString().split('T')[0];
  const filename = `${safe(match.teamA)}-v-${safe(match.teamB)}-${dateStr}.pdf`;

  // Try Web Share API with file (best on iOS — opens share sheet → Files, Mail, Messages)
  try {
    if (navigator.share && navigator.canShare) {
      const blob = doc.output('blob');
      const file = new File([blob], filename, { type: 'application/pdf' });
      if (navigator.canShare({ files: [file] })) {
        navigator.share({
          files: [file],
          title: `${match.teamA} v ${match.teamB} — Scorecard`,
          text: `${match.teamA} v ${match.teamB}${match.result ? ' — ' + match.result : ''}`
        }).catch(err => {
          if (err.name !== 'AbortError') doc.save(filename);
        });
        return;
      }
    }
  } catch (e) { /* fall through to save */ }

  doc.save(filename);
}

// =========================================================================
// EVENT HANDLERS
// =========================================================================
function attachEventHandlers() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleAction);
  });
  if (view === 'setup') {
    const fmt = document.getElementById('format');
    if (fmt) fmt.addEventListener('change', () => {
      document.getElementById('standard-opts').style.display = fmt.value === 'standard' ? '' : 'none';
      document.getElementById('pairs-opts').style.display = fmt.value === 'pairs' ? '' : 'none';
    });
  }
}

function handleAction(e) {
  e.stopPropagation();
  const el = e.currentTarget;
  const action = el.dataset.action;
  if (action === 'new-match') { view = 'setup'; render(); return; }
  if (action === 'goto-home') { view = 'home'; modal = null; render(); return; }
  if (action === 'open-match') { match = matches.find(m => m.id === el.dataset.id); view = match.result ? 'scorecard' : 'scoring'; stateHistory = []; render(); return; }
  if (action === 'delete-match') {
    if (!confirm('Delete this match?')) return;
    matches = matches.filter(m => m.id !== el.dataset.id);
    saveAll(); render();
    return;
  }
  if (action === 'start-match') {
    const fmt = document.getElementById('format').value;
    const opts = {
      format: fmt,
      teamA: document.getElementById('teamA').value || 'Home',
      teamB: document.getElementById('teamB').value || 'Away',
      oversTotal: parseInt(document.getElementById('oversTotal').value) || 20,
      totalInnings: parseInt(document.getElementById('totalInnings').value) || 2,
      battingFirst: document.getElementById('battingFirst').value,
      widePenalty: parseInt(document.getElementById('widePenalty').value) || 1,
      noBallPenalty: parseInt(document.getElementById('noBallPenalty').value) || 1,
      wideRebowled: document.getElementById('wideRebowled').checked,
      noBallRebowled: document.getElementById('noBallRebowled').checked,
      playersA: document.getElementById('playersA').value.split('\n').map(s => s.trim()).filter(Boolean),
      playersB: document.getElementById('playersB').value.split('\n').map(s => s.trim()).filter(Boolean),
    };
    if (fmt === 'standard') {
      opts.wicketsToOut = parseInt(document.getElementById('wicketsToOut').value) || 10;
      while (opts.playersA.length < opts.wicketsToOut + 1) opts.playersA.push(`Batter ${opts.playersA.length + 1}`);
      while (opts.playersB.length < opts.wicketsToOut + 1) opts.playersB.push(`Bowler ${opts.playersB.length + 1}`);
    } else {
      opts.pairCount = parseInt(document.getElementById('pairCount').value) || 5;
      opts.oversPerPair = parseInt(document.getElementById('oversPerPair').value) || 4;
      opts.startScore = parseInt(document.getElementById('startScore').value) || 0;
      while (opts.playersA.length < opts.pairCount * 2) opts.playersA.push(`Batter ${opts.playersA.length + 1}`);
      while (opts.playersB.length < 11) opts.playersB.push(`Bowler ${opts.playersB.length + 1}`);
    }
    match = createMatch(opts);
    upsertMatch();
    stateHistory = [];
    view = 'scoring';
    render();
    return;
  }
  if (action === 'runs') { addRuns(parseInt(el.dataset.runs), false); return; }
  if (action === 'extra') { promptExtraRuns(el.dataset.type); return; }
  if (action === 'confirm-extra') { closeModal(); addExtra(el.dataset.type, parseInt(el.dataset.runs)); return; }
  if (action === 'wicket') { promptWicket(); return; }
  if (action === 'wicket-method') { pickWicketMethod(el.dataset.method); return; }
  if (action === 'pick-fielder') { pickFielder(el.dataset.name); return; }
  if (action === 'run-out-runs') {
    modal.data.runsCompleted = parseInt(el.dataset.runs);
    render();
    return;
  }
  if (action === 'run-out-batter') {
    modal.data.batterOutPos = el.dataset.position;
    promptCrossed(modal.data);
    return;
  }
  if (action === 'finalise-wicket-crossed') {
    const crossed = el.dataset.crossed === 'true';
    const d = modal.data;
    closeModal();
    addWicket(d.method, d.batterOutPos, d.runsCompleted || 0, crossed, d.fielderName || null);
    return;
  }
  if (action === 'finalise-wicket') {
    // Simple dismissals (Bowled, LBW, Stumped, Hit wicket, Retired) — no crossed question
    const method = el.dataset.method;
    const position = el.dataset.position;
    const runs = parseInt(el.dataset.runs) || 0;
    closeModal();
    addWicket(method, position, runs, false, null);
    return;
  }
  if (action === 'undo') { undo(); return; }
  if (action === 'scorecard') { closeModal(); view = 'scorecard'; render(); return; }
  if (action === 'back-to-scoring') { view = 'scoring'; render(); return; }
  if (action === 'export-pdf') { generatePDF(); return; }
  if (action === 'select-bowler') { promptBowler(false); return; }
  if (action === 'pick-bowler') { pickBowler(parseInt(el.dataset.idx)); upsertMatch(); render(); return; }
  if (action === 'pick-batter') {
    const crossed = modal && modal.data ? !!modal.data.crossed : false;
    pickBatter(parseInt(el.dataset.idx), el.dataset.position, crossed);
    return;
  }
  if (action === 'show-menu') { modal = { type: 'menu' }; render(); return; }
  if (action === 'change-bowler') { closeModal(); promptBowler(true); return; }
  if (action === 'swap-batters') {
    snapshot(); swapStrike(); upsertMatch(); closeModal(); render();
    return;
  }
  if (action === 'end-innings-confirm') {
    if (!confirm('End this innings?')) return;
    snapshot(); endInnings(); upsertMatch(); closeModal(); render();
    return;
  }
  if (action === 'edit-names') { modal = { type: 'edit-names' }; render(); return; }
  if (action === 'save-names') {
    snapshot();
    document.querySelectorAll('.edit-name-input').forEach(input => {
      const team = input.dataset.team;
      const idx = parseInt(input.dataset.idx);
      const newName = input.value.trim() || `Player ${idx+1}`;
      const roster = team === 'a' ? match.playersA : match.playersB;
      roster[idx] = newName;
      match.innings.forEach(ing => {
        if (ing.battingTeam === team) {
          if (ing.batters[idx]) ing.batters[idx].name = newName;
        } else {
          if (ing.bowlers[idx]) ing.bowlers[idx].name = newName;
        }
      });
    });
    upsertMatch();
    closeModal();
    showToast('Player names updated');
    return;
  }
  if (action === 'close-modal') { closeModal(); return; }
  if (action === 'close-modal-backdrop') {
    if (e.target === el) closeModal();
    return;
  }
}

// =========================================================================
// BOOT
// =========================================================================
loadAll();
render();
window.addEventListener('beforeunload', () => { if (match) upsertMatch(); });
</script>
