<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b1322">
<title>Cricket — Live Scoreboard</title>
<style>
  :root {
    --navy:#16233a; --navy-deep:#0b1322; --gold:#e0bd6e; --gold-bright:#f0d27a;
    --ink:#f3ead2; --seam:#070d18; --muted:#8694ab;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { background:var(--navy-deep); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100%; }
  body { padding:18px 16px 40px; max-width:520px; margin:0 auto; }

  .masthead { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .teams { font-size:15px; font-weight:800; letter-spacing:0.06em; text-transform:uppercase; color:var(--gold); }
  .live { display:flex; align-items:center; gap:6px; font-size:11px; font-weight:700; letter-spacing:0.08em;
    text-transform:uppercase; color:var(--muted); }
  .dot { width:8px; height:8px; border-radius:50%; background:#3ad07a; box-shadow:0 0 8px #3ad07a; }
  .live.stale .dot { background:#b9472f; box-shadow:none; }

  .panel { background:linear-gradient(180deg,#1a2a44,#101b2e); border-radius:18px; padding:18px 16px;
    box-shadow:0 8px 30px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05); }
  .batting { font-size:12px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--gold); margin-bottom:12px; }

  .scoreline { display:flex; align-items:center; gap:14px; }
  .ov-wrap { margin-top:14px; display:flex; align-items:baseline; gap:10px; }
  .ov-label { font-size:11px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); }

  /* ---- split-flap ---- */
  .flaps { display:flex; gap:5px; }
  .flap { position:relative; border-radius:7px; background:var(--navy);
    width:var(--fw); height:var(--fh); perspective:300px;
    box-shadow:0 2px 5px rgba(0,0,0,0.45); }
  .flap .half { position:absolute; left:0; width:100%; height:50%; overflow:hidden;
    background:var(--navy); display:block; }
  .flap .top { top:0; border-radius:7px 7px 0 0; }
  .flap .bottom { bottom:0; border-radius:0 0 7px 7px; background:#13203550; }
  .flap .half span { position:absolute; left:0; width:100%; text-align:center;
    height:var(--fh); line-height:var(--fh); font-size:var(--ffs); font-weight:800; color:var(--ink);
    font-variant-numeric:tabular-nums; }
  .flap .top span { top:0; }
  .flap .bottom span { bottom:0; }
  .flap::after { content:""; position:absolute; top:calc(50% - 1px); left:0; width:100%; height:2px;
    background:var(--seam); z-index:6; }
  /* flipping leaves */
  .flap .leaf { position:absolute; left:0; width:100%; height:50%; overflow:hidden; z-index:5;
    backface-visibility:hidden; }
  .flap .leaf.lt { top:0; border-radius:7px 7px 0 0; transform-origin:50% 100%; background:var(--navy); }
  .flap .leaf.lb { bottom:0; border-radius:0 0 7px 7px; transform-origin:50% 0%; background:#132035; }
  .flap .leaf span { position:absolute; left:0; width:100%; text-align:center;
    height:var(--fh); line-height:var(--fh); font-size:var(--ffs); font-weight:800; color:var(--ink);
    font-variant-numeric:tabular-nums; }
  .flap .leaf.lt span { top:0; }
  .flap .leaf.lb span { bottom:0; }
  @keyframes fallTop { from { transform:rotateX(0deg); } to { transform:rotateX(-90deg); } }
  @keyframes fallBottom { from { transform:rotateX(90deg); } to { transform:rotateX(0deg); } }

  /* big score sizing */
  .big { --fw:46px; --fh:66px; --ffs:52px; }
  .ovs { --fw:26px; --fh:38px; --ffs:30px; }

  .rows { margin-top:18px; display:flex; flex-direction:column; gap:9px; }
  .row { display:flex; align-items:center; background:rgba(255,255,255,0.035); border-radius:10px;
    padding:11px 13px; }
  .row .lbl { font-size:10px; font-weight:800; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--muted); width:64px; flex:none; }
  .row .nm { font-size:17px; font-weight:700; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .row .nm .star { color:var(--gold-bright); }
  .row .fig { font-size:16px; font-weight:800; font-variant-numeric:tabular-nums; color:var(--ink); }

  .overpips { margin-top:14px; display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
  .overpips .ol { font-size:10px; font-weight:800; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
  .pip { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:800; color:var(--navy-deep); background:rgba(255,255,255,0.85); }
  .pip.w { background:#cf3a2a; color:#fff; } .pip.boundary { background:var(--gold); }

  .status { margin-top:16px; text-align:center; font-size:16px; font-weight:700; color:var(--gold-bright);
    min-height:22px; }

  /* ---- scorecard (builds up below the live view) ---- */
  .sc-title { margin-top:26px; font-size:12px; font-weight:800; letter-spacing:0.14em;
    text-transform:uppercase; color:var(--muted); text-align:center; }
  .sc-panel { margin-top:12px; background:linear-gradient(180deg,#1a2a44,#101b2e); border-radius:14px;
    padding:14px 13px; box-shadow:0 6px 22px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.05); }
  .sc-head { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:8px; }
  .sc-head .sc-team { font-size:14px; font-weight:800; letter-spacing:0.04em; text-transform:uppercase;
    color:var(--gold); }
  .sc-head .sc-score { font-size:14px; font-weight:800; font-variant-numeric:tabular-nums; }
  .sc-head .sc-ov { font-size:12px; font-weight:600; color:var(--muted); margin-left:6px; }
  .sc-table { width:100%; border-collapse:collapse; font-variant-numeric:tabular-nums; }
  .sc-table th { font-size:10px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase;
    color:var(--gold); text-align:right; padding:5px 0 5px 8px; border-bottom:1px solid rgba(255,255,255,0.08); }
  .sc-table th:first-child { text-align:left; padding-left:0; }
  .sc-table td { font-size:14px; font-weight:600; text-align:right; padding:6px 0 6px 8px;
    border-bottom:1px solid rgba(255,255,255,0.06); white-space:nowrap; }
  .sc-table td:first-child { text-align:left; padding-left:0; max-width:0; width:99%;
    overflow:hidden; text-overflow:ellipsis; }
  .sc-table tr:last-child td { border-bottom:0; }
  .sc-table .sc-r { font-weight:800; }
  .sc-table .sc-w { font-weight:800; }
  .sc-how { font-size:11px; font-weight:500; font-style:italic; color:var(--muted); margin-top:1px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sc-nm { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sc-nm .star { color:var(--gold-bright); }
  .sc-extras { display:flex; justify-content:space-between; font-size:12px; font-weight:600;
    color:var(--muted); padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.08); }
  .sc-extras .sc-total { color:var(--ink); font-weight:800; font-variant-numeric:tabular-nums; }
  .sc-fow { font-size:11px; color:var(--muted); line-height:1.6; padding:8px 0 10px; }
  .sc-fow .sc-fowlbl { font-weight:800; letter-spacing:0.08em; text-transform:uppercase; color:var(--gold);
    margin-right:4px; }
  .sc-bowl { margin-top:4px; }
  .result { margin-top:16px; text-align:center; background:var(--gold); color:var(--navy-deep);
    font-weight:800; font-size:17px; padding:12px; border-radius:12px; }
  .foot { margin-top:22px; text-align:center; font-size:11px; color:var(--muted); letter-spacing:0.04em; }
  .waiting { text-align:center; color:var(--muted); margin-top:80px; font-size:15px; }

  /* picker */
  .pickhead { font-size:12px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--gold); margin:4px 2px 12px; }
  .pickrow { display:flex; align-items:center; justify-content:space-between; text-decoration:none;
    color:var(--ink); background:linear-gradient(180deg,#1a2a44,#101b2e); border-radius:14px;
    padding:15px 16px; margin-bottom:11px; box-shadow:0 4px 14px rgba(0,0,0,0.3); }
  .pickrow:active { transform:scale(0.99); }
  .pteams { font-size:18px; font-weight:800; }
  .psub { font-size:13px; color:var(--muted); margin-top:3px; }
  .pmeta { display:flex; align-items:center; gap:10px; flex:none; }
  .plive { font-size:10px; font-weight:800; letter-spacing:0.06em; color:var(--navy-deep);
    background:var(--gold-bright); padding:3px 8px; border-radius:20px; }
  .pago { font-size:12px; color:var(--muted); }
  .pchev { color:var(--muted); font-size:20px; }
  .backlink { display:inline-block; color:var(--muted); text-decoration:none; font-size:13px;
    font-weight:600; margin-bottom:12px; }
  .backlink:active { color:var(--gold); }
  .archlink { display:block; text-align:center; color:var(--gold); text-decoration:none;
    font-weight:700; font-size:14px; margin-top:20px; padding:12px; }
  .archlink:active { color:var(--gold-bright); }

  /* school-code recovery gate */
  .codegate { margin-top:60px; text-align:center; }
  .codegate p { color:var(--muted); font-size:14px; margin-bottom:16px; line-height:1.5; }
  .codeform { display:flex; gap:8px; max-width:320px; margin:0 auto; }
  .codeform input { flex:1; min-width:0; background:var(--navy); color:var(--ink);
    border:1px solid rgba(224,189,110,0.35); border-radius:10px; padding:12px 14px;
    font-size:16px; font-weight:600; outline:none; }
  .codeform input:focus { border-color:var(--gold); }
  .codeform button { flex:none; background:var(--gold); color:var(--navy-deep); border:0;
    border-radius:10px; padding:12px 18px; font-size:15px; font-weight:800; cursor:pointer; }
  .codeform button:active { background:var(--gold-bright); }
</style>
</head>
<body>
  <div id="app">
    <div class="masthead">
      <div class="teams" id="teams">Cricket</div>
      <div class="live stale" id="live"><span class="dot"></span><span id="livetxt">Connecting</span></div>
    </div>
    <div id="content"><div class="waiting" id="waiting">Waiting for the match to start…</div></div>
  </div>

<script>
const SUPABASE = "https://dlcseuejvducbsjhqvze.supabase.co";
const ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRsY3NldWVqdmR1Y2JzamhxdnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzY3NTUsImV4cCI6MjA4ODExMjc1NX0.MPkeXx_3cgm99RabE4W97jhFtB1ZXycUsR0ofCnNEPs";
const matchId = new URLSearchParams(location.search).get("m");
// School code: prefer the ?s= param, else fall back to a remembered code.
// Persist whenever a code is present so internal navigation never dead-ends.
const CLUB_KEY = "cricket-board-club";
let club = new URLSearchParams(location.search).get("s");
try {
  if (club) localStorage.setItem(CLUB_KEY, club);
  else club = localStorage.getItem(CLUB_KEY);
} catch (e) {}
// Append ?s=<club> to an internal href so navigation keeps the school context.
function withClub(href) {
  if (!club) return href;
  const sep = href.indexOf("?") === -1 ? "?" : "&";
  return href + sep + "s=" + encodeURIComponent(club);
}

// ---------- split-flap ----------
function ensureFlaps(container, len, sizeClass) {
  if (container.dataset.len == len && container.classList.contains(sizeClass)) return;
  container.className = "flaps " + sizeClass;
  container.dataset.len = len;
  container.innerHTML = "";
  for (let i = 0; i < len; i++) {
    const f = document.createElement("div");
    f.className = "flap";
    f.innerHTML = '<div class="half top"><span></span></div><div class="half bottom"><span></span></div>';
    f.dataset.ch = " ";
    container.appendChild(f);
  }
}
function setFlap(flap, ch) {
  const old = flap.dataset.ch;
  if (old === ch) return;
  flap.dataset.ch = ch;
  const top = flap.querySelector(".top span");
  const bottom = flap.querySelector(".bottom span");
  // build flip leaves
  const lt = document.createElement("div"); lt.className = "leaf lt";
  lt.innerHTML = '<span>' + old + '</span>';
  const lb = document.createElement("div"); lb.className = "leaf lb";
  lb.innerHTML = '<span>' + ch + '</span>';
  top.textContent = ch;                 // new char revealed behind falling top leaf
  flap.appendChild(lt); flap.appendChild(lb);
  lt.style.animation = "fallTop 0.13s ease-in forwards";
  lb.style.animation = "fallBottom 0.13s ease-out 0.13s forwards";
  lt.addEventListener("animationend", () => lt.remove());
  lb.addEventListener("animationend", () => { bottom.textContent = ch; lb.remove(); });
}
function setFlaps(container, text, len, sizeClass) {
  ensureFlaps(container, len, sizeClass);
  const flaps = container.children;
  const padded = String(text).padStart(len, " ").slice(-len);
  for (let i = 0; i < len; i++) setFlap(flaps[i], padded[i]);
}

// ---------- render ----------
let built = false;
function buildLayout() {
  document.getElementById("content").innerHTML = `
    <a class="backlink" href="${withClub('./')}">‹ All matches</a>
    <div class="panel">
      <div class="batting" id="batting"></div>
      <div class="scoreline"><div class="flaps big" id="score"></div></div>
      <div class="ov-wrap"><span class="ov-label">Overs</span><div class="flaps ovs" id="overs"></div></div>
      <div class="overpips" id="overpips"></div>
    </div>
    <div class="rows">
      <div class="row"><span class="lbl">Striker</span><span class="nm" id="stk"></span><span class="fig" id="stkf"></span></div>
      <div class="row"><span class="lbl">Non-str</span><span class="nm" id="nst"></span><span class="fig" id="nstf"></span></div>
      <div class="row"><span class="lbl">Bowler</span><span class="nm" id="bwl"></span><span class="fig" id="bwlf"></span></div>
    </div>
    <div class="status" id="status"></div>
    <div id="resultwrap"></div>
    <div id="scorecard"></div>
    <div class="foot">Live from Cricket Scorer · updates each over</div>`;
  built = true;
}
function esc(s){ return (s||"").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function render(s, updatedAt) {
  document.getElementById("teams").textContent = (s.teamA + " v " + s.teamB).toUpperCase();
  if (!built) buildLayout();

  document.getElementById("batting").textContent = s.batting.toUpperCase() + " · " + s.inningsLabel;
  const scoreTxt = s.score + "/" + s.wickets;
  const oversTxt = String(s.overs);
  setFlaps(document.getElementById("score"), scoreTxt, scoreTxt.length, "big");
  setFlaps(document.getElementById("overs"), oversTxt, oversTxt.length, "ovs");

  document.getElementById("stk").innerHTML = esc(s.striker) + ' <span class="star">•</span>';
  document.getElementById("stkf").textContent = s.strikerRuns + " (" + s.strikerBalls + ")";
  document.getElementById("nst").textContent = s.nonStriker;
  document.getElementById("nstf").textContent = s.nonStrikerRuns + " (" + s.nonStrikerBalls + ")";
  document.getElementById("bwl").textContent = s.bowler;
  document.getElementById("bwlf").textContent = s.bowlerWkts + "-" + s.bowlerRuns + " (" + s.bowlerOvers + ")";

  const op = document.getElementById("overpips");
  if (s.lastOver && s.lastOver.length) {
    op.innerHTML = '<span class="ol">Last over</span>' + s.lastOver.map(p => {
      let cls = "pip", t = p;
      if (p === "W") cls += " w";
      else if (p === "4" || p === "6") cls += " boundary";
      else if (p === "0") t = "•";
      return '<span class="' + cls + '">' + esc(t) + '</span>';
    }).join("");
  } else op.innerHTML = "";

  const status = document.getElementById("status");
  if (s.need != null && s.ballsLeft != null && !s.result) {
    status.textContent = s.need > 0 ? `Need ${s.need} from ${s.ballsLeft} balls` : "Target reached";
  } else status.textContent = "";

  const rw = document.getElementById("resultwrap");
  rw.innerHTML = s.result ? '<div class="result">' + esc(s.result) + '</div>' : "";

  renderScorecard(s);
}

// Full scorecard below the live view. `s.card` arrived in the 10 Jun app build —
// older payloads simply don't have it, so the board shows nothing extra.
function renderScorecard(s) {
  const el = document.getElementById("scorecard");
  if (!s.card || !s.card.length) { el.innerHTML = ""; return; }
  const ovUnit = s.unit === "balls" ? "B" : "O";
  el.innerHTML = '<div class="sc-title">Scorecard</div>' + s.card.map(c => {
    const batRows = (c.batting || []).map(b =>
      `<tr><td><div class="sc-nm">${esc(b.name)}${b.live ? ' <span class="star">*</span>' : ""}</div>` +
      `<div class="sc-how">${esc(b.how)}</div></td>` +
      `<td class="sc-r">${b.runs}</td><td>${b.balls}</td><td>${b.fours}</td><td>${b.sixes}</td></tr>`).join("");
    const bowlRows = (c.bowling || []).map(b =>
      `<tr><td><div class="sc-nm">${esc(b.name)}</div></td>` +
      `<td>${esc(String(b.overs))}</td><td>${b.maidens}</td><td>${b.runs}</td><td class="sc-w">${b.wickets}</td></tr>`).join("");
    return `<div class="sc-panel">
      <div class="sc-head"><span class="sc-team">${esc(c.team)}</span>
        <span class="sc-score">${c.score}/${c.wickets}<span class="sc-ov">(${esc(String(c.overs))} ${esc(s.unit || "ov")})</span></span></div>
      ${batRows ? `<table class="sc-table">
        <thead><tr><th>Batter</th><th>R</th><th>B</th><th>4s</th><th>6s</th></tr></thead>
        <tbody>${batRows}</tbody></table>` : ""}
      <div class="sc-extras"><span>Extras ${c.extras} (${esc(c.extrasDetail || "")})</span>
        <span class="sc-total">Total ${c.score}/${c.wickets}</span></div>
      ${c.fow && c.fow.length ? `<div class="sc-fow"><span class="sc-fowlbl">Fall of wickets</span>${c.fow.map(esc).join(", ")}</div>` : ""}
      ${bowlRows ? `<table class="sc-table sc-bowl">
        <thead><tr><th>Bowler</th><th>${ovUnit}</th><th>M</th><th>R</th><th>W</th></tr></thead>
        <tbody>${bowlRows}</tbody></table>` : ""}
    </div>`;
  }).join("");
}

function setLive(updatedAt) {
  const live = document.getElementById("live"), txt = document.getElementById("livetxt");
  if (!updatedAt) { live.classList.add("stale"); txt.textContent = "Offline"; return; }
  // Updates land once per over (minutes apart), so only flag "paused" after a long gap.
  const age = Math.max(0, (Date.now() - new Date(updatedAt).getTime()) / 1000);
  if (age < 900) { live.classList.remove("stale"); txt.textContent = "Live"; }
  else { live.classList.add("stale"); txt.textContent = "Paused"; }
}

// Dev only: ?fixture=<file> renders a local JSON fixture (same shape as the
// Supabase response) instead of polling — e.g. ?m=test&fixture=fixture.json
const fixture = new URLSearchParams(location.search).get("fixture");

async function poll() {
  if (!matchId) { document.getElementById("waiting").textContent = "No match specified."; return; }
  try {
    const r = fixture
      ? await fetch(fixture)
      : await fetch(`${SUPABASE}/rest/v1/live_matches?id=eq.${encodeURIComponent(matchId)}&select=state,updated_at`,
      { headers: { apikey: ANON, Authorization: "Bearer " + ANON } });
    const rows = await r.json();
    if (rows && rows[0]) { render(rows[0].state, rows[0].updated_at); setLive(rows[0].updated_at); }
    else { document.getElementById("livetxt").textContent = "Waiting"; }
  } catch (e) {
    document.getElementById("live").classList.add("stale");
    document.getElementById("livetxt").textContent = "Offline";
  }
}
// ---------- picker (no ?m= → list of matches) ----------
function relTime(ts) {
  const s = Math.max(0, (Date.now() - new Date(ts).getTime()) / 1000);
  if (s < 60) return "just now";
  if (s < 3600) return Math.floor(s / 60) + " min ago";
  if (s < 86400) return Math.floor(s / 3600) + "h ago";
  return Math.floor(s / 86400) + "d ago";
}
let allRows = [];
let showArchive = false;

function isToday(ts) {
  const d = new Date(ts), n = new Date();
  return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth() && d.getDate() === n.getDate();
}
function dayLabel(ts) {
  return new Date(ts).toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" });
}
function matchRowHTML(r, withDate) {
  const s = r.state || {};
  const live = (Date.now() - new Date(r.updated_at).getTime()) / 1000 < 900 && !s.result;
  const sub = s.result ? esc(s.result)
    : (s.score != null ? `${s.score}/${s.wickets} · ${esc(String(s.overs))} ${esc(s.unit || "ov")}` : "—");
  const meta = live ? '<span class="plive">LIVE</span>'
    : '<span class="pago">' + (withDate ? dayLabel(r.updated_at) : relTime(r.updated_at)) + "</span>";
  return `<a class="pickrow" href="${withClub('?m=' + encodeURIComponent(r.id))}">
    <div class="pinfo"><div class="pteams">${esc((s.teamA || "?") + " v " + (s.teamB || "?"))}</div>
    <div class="psub">${sub}</div></div>
    <div class="pmeta">${meta}<span class="pchev">›</span></div></a>`;
}
function renderPicker() {
  const content = document.getElementById("content");
  const today = allRows.filter(r => isToday(r.updated_at));
  const past = allRows.filter(r => !isToday(r.updated_at));

  if (showArchive) {
    let html = '<a class="backlink" id="toToday" href="#">‹ Today</a><div class="pickhead">Past matches</div>';
    html += past.length ? past.map(r => matchRowHTML(r, true)).join("")
                        : '<div class="waiting">No past matches.</div>';
    content.innerHTML = html;
    const t = document.getElementById("toToday");
    if (t) t.onclick = e => { e.preventDefault(); showArchive = false; renderPicker(); };
    return;
  }

  let html = '<div class="pickhead">Today’s matches</div>';
  html += today.length ? today.map(r => matchRowHTML(r, false)).join("")
                       : '<div class="waiting" style="margin-top:30px;">No matches today yet.</div>';
  if (past.length) html += `<a class="archlink" id="toArchive" href="#">Past matches (${past.length}) ›</a>`;
  content.innerHTML = html;
  const a = document.getElementById("toArchive");
  if (a) a.onclick = e => { e.preventDefault(); showArchive = true; renderPicker(); };
}
function showCodeGate() {
  // Idempotent: don't rebuild (and wipe what the user is typing) if already shown.
  if (document.getElementById("codeform")) return;
  document.getElementById("content").innerHTML =
    '<div class="codegate">' +
      '<p>Enter your school code to see its matches.</p>' +
      '<form class="codeform" id="codeform">' +
        '<input id="codeinput" type="text" autocapitalize="none" autocorrect="off" ' +
        'spellcheck="false" placeholder="e.g. sedbergh" aria-label="School code">' +
        '<button type="submit">View</button>' +
      '</form>' +
    '</div>';
  const form = document.getElementById("codeform");
  form.onsubmit = e => {
    e.preventDefault();
    const code = document.getElementById("codeinput").value.trim().toLowerCase();
    if (!code) return;
    location.href = "?s=" + encodeURIComponent(code);
  };
}
async function pollPicker() {
  if (!club) { showCodeGate(); return; }
  try {
    const since = new Date(Date.now() - 150 * 86400000).toISOString(); // this season only
    const r = await fetch(`${SUPABASE}/rest/v1/live_matches?select=id,state,updated_at&club=eq.${encodeURIComponent(club)}&updated_at=gte.${since}&order=updated_at.desc&limit=200`,
      { headers: { apikey: ANON, Authorization: "Bearer " + ANON } });
    allRows = (await r.json()) || [];
    renderPicker();
  } catch (e) {
    document.getElementById("content").innerHTML = '<div class="waiting">Couldn’t load matches. Check your connection.</div>';
  }
}

// ---------- router ----------
if (matchId) {
  poll();
  setInterval(poll, 4000);
} else {
  document.getElementById("live").style.display = "none";
  document.getElementById("teams").textContent = club ? (club.toUpperCase() + " CRICKET") : "LIVE CRICKET";
  pollPicker();
  setInterval(pollPicker, 10000);
}
</script>
</body>
